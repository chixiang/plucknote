<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <title>App Store Free - PluckNote</title>
  <link rel="stylesheet" href="styles/iphone-frame.css">
<style>    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1290px; height: 2796px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: #FAF8F8; color: #1a1a1a; overflow: hidden;
    }
    .top-section {
      height: 1068px;
      display: flex; flex-direction: column; align-items: center; padding: 360px 100px 0;
      text-align: center;
    }
    .eyebrow {
      display: inline-block; font-size: 24px; letter-spacing: 0.12em; text-transform: uppercase;
      color: #5B7CDB; font-weight: 700; background: #EEF2FB;
      padding: 14px 28px; border-radius: 999px; margin-bottom: 24px;
    }
    h1 { font-size: 140px; font-weight: 900; line-height: 1.1; color: #1a1a1a; letter-spacing: -0.03em; margin-bottom: 12px; }
    h1 .accent { color: #5B7CDB; }
    .subtitle { font-size: 28px; color: #555; line-height: 1.4; max-width: 800px; margin: 0 auto; }
    .bottom-section {
      height: 1728px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .devices-row {
      display: flex; align-items: flex-end; gap: 40px; justify-content: center;
    }
    .mac-wrapper, .iphone-wrapper { display: flex; flex-direction: column; align-items: center; }
    .device-label { margin-top: 16px; font-size: 24px; font-weight: 600; color: #555; letter-spacing: 0.05em; }
    .iphone-wrapper .iphone-frame { border-radius: 24px; padding: 4px; }
    .iphone-wrapper .iphone-screen { border-radius: 18px; }
    .iphone-wrapper .screen-glare { border-radius: 18px 18px 0 0; }
    .iphone-wrapper .iphone-button.left-action { top: 50px; }
    .iphone-wrapper .iphone-button.volume-up { top: 70px; }
    .iphone-wrapper .iphone-button.volume-down { top: 95px; }
    .iphone-wrapper .iphone-button.power { top: 85px; }
    .divider { margin: 24px 0 20px; font-size: 24px; color: #888; font-weight: 500; text-align: center; }
    .price-row {
      display: flex; align-items: center; gap: 16px;
      background: #5B7CDB; padding: 20px 48px; border-radius: 999px;
      box-shadow: 0 10px 40px rgba(91,124,219,0.35);
    }
    .price-title { font-size: 28px; font-weight: 700; color: #fff; }
    .price-desc { font-size: 24px; color: rgba(255,255,255,0.85); font-weight: 500; }
</style>
</head>
<body>
  <div class="top-section">
    <div class="eyebrow">iOS 免费版</div>
    <h1>已足够<br><span class="accent">日常使用</span></h1>
    <p class="subtitle">记录、清单、颜色、日期——全部免费</p>
  </div>
  <div class="bottom-section">
    <div class="devices-row">
      <div class="mac-wrapper">
        <div class="mac-frame" style="width: 620px; height: 420px;">
          <div class="mac-screen"><img src="screens/05-mac.png" alt="PluckNote on Mac"></div>
          <div class="mac-base"></div>
        </div>
        <div class="device-label">Mac</div>
      </div>
      <div class="iphone-wrapper">
        <div class="iphone-frame" style="width: 160px; height: 350px;">
          <div class="iphone-button left-action"></div>
          <div class="iphone-button volume-up"></div>
          <div class="iphone-button volume-down"></div>
          <div class="iphone-button power"></div>
          <div class="iphone-screen">
            <div class="dynamic-island"></div>
            <div class="screen-glare"></div>
            <img src="screens/03-someday.png" alt="PluckNote Someday">
          </div>
        </div>
        <div class="device-label">iPhone</div>
      </div>
    </div>
    <div class="divider">仅多端同步需付费解锁</div>
    <div class="price-row">
      <div class="price-title">全平台解锁</div>
      <div class="price-desc">一次买断</div>
    </div>
  </div>
</body>
</html>
